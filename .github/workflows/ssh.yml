name: VNC Desktop Runner (macOS + Pinggy)
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  vnc-session:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable macOS VNC Server
        run: |
          echo "Resetting system user 'runner' password to 0000..."
          # Pass the empty old password "" to authorize the change to "0000"
          sudo dscl . -passwd /Users/runner "" 0000 || true
          sudo dscl . -passwd /Users/runner 0000 || true

          echo "Creating a backup VNC user 'gha' with password 0000..."
          sudo dscl . -create /Users/gha || true
          sudo dscl . -create /Users/gha UserShell /bin/bash || true
          sudo dscl . -create /Users/gha RealName "GHA User" || true
          sudo dscl . -create /Users/gha UniqueID 599 || true
          sudo dscl . -create /Users/gha PrimaryGroupID 20 || true
          sudo dscl . -create /Users/gha NFSHomeDirectory /Users/gha || true
          sudo dscl . -passwd /Users/gha 0000 || true
          sudo dscl . -append /Groups/admin GroupMembership gha || true
          sudo mkdir -p /Users/gha || true
          sudo chown gha:staff /Users/gha || true

          echo "Enabling macOS Screen Sharing..."
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers -privs -all \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -configure -clientopts -setvncpw -vncpw 0000 \
            -restart -agent

          echo "Disabling display sleep and waking up the virtual screen..."
          sudo pmset -a displaysleep 0 || true
          caffeinate -u -t 5 || true

      - name: Start VNC Tunnel (Pinggy)
        run: |
          echo "=========================================================="
          echo "🔑 VNC Password is set to: 0000"
          echo "📌 Look for the tcp://... url below."
          echo "🔌 Connect using RealVNC Viewer to: hostname::port"
          echo "=========================================================="
          
          # Starts the tunnel and keeps it open
          ssh -p 443 -o StrictHostKeyChecking=no -R0:localhost:5900 tcp@a.pinggy.io
