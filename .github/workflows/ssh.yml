name: VNC Desktop Runner (macOS + Pinggy)
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  vnc-session:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Enable macOS VNC Server
        run: |
          echo "Setting system user 'runner' password to 0000..."
          sudo sysadminctl -resetPasswordFor runner -newPassword 0000

          echo "Enabling macOS Screen Sharing..."
          # Configure remote management, allow access for all users, and set the VNC password to 0000
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -configure -allowAccessFor -allUsers -privs -all \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -configure -clientopts -setvncpw -vncpw 0000 \
            -restart -agent

      - name: Start VNC Tunnel (Pinggy)
        run: |
          echo "=========================================================="
          echo "🔑 VNC Password is set to: 0000"
          echo "📌 Look for the tcp://... url below."
          echo "🔌 Connect using RealVNC Viewer to: hostname::port"
          echo "=========================================================="
          
          # Starts the tunnel and keeps it open
          ssh -p 443 -o StrictHostKeyChecking=no -R0:localhost:5900 tcp@a.pinggy.io
